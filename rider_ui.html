<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Rider UI - EGP</title>
<style>
:root{
  --blue:#007AFF;
  --deep:#1C2541;
  --bg:#F2F4F8;
  --white:#FFFFFF;
  --gray:#8E8E93;
  --shadow:0 10px 20px rgba(0,0,0,.08);
  --shadow-soft:0 4px 12px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#0f2027; height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden;
}
.phone{
  width:390px; height:844px; border-radius:50px; overflow:hidden; position:relative;
  border:8px solid #000; box-shadow:0 0 50px rgba(0,0,0,.5);
}
.map{
  position:absolute; inset:0;
  background:radial-gradient(circle at 50% 50%,#eef1f5,#dfe4ee);
  overflow:hidden;
}
.map::before{
  content:""; position:absolute; inset:0;
  background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0 1px, transparent 1px 40px),
                    repeating-linear-gradient(90deg, rgba(0,0,0,0.02) 0 1px, transparent 1px 40px);
  animation:mapmove 15s linear infinite;
}
@keyframes mapmove{
  0%{background-position:0 0,0 0;}
  100%{background-position:40px 40px,40px 40px;}
}
.pin{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-60%);
  width:24px; height:24px; background:var(--blue); border:4px solid #fff;
  border-radius:50%; z-index:5; box-shadow:0 0 20px rgba(0,122,255,.7);
  animation:pinpulse 2s infinite;
}
@keyframes pinpulse{
  0%{box-shadow:0 0 0 0 rgba(0,122,255,.6);}
  70%{box-shadow:0 0 0 25px rgba(0,122,255,0);}
  100%{box-shadow:0 0 0 0 rgba(0,122,255,0);}
}
.search{
  position:absolute; top:60px; left:20px; right:20px; height:52px;
  background:rgba(255,255,255,.85); backdrop-filter:blur(12px);
  border-radius:30px; box-shadow:0 10px 20px rgba(0,0,0,.08);
  display:flex; align-items:center; padding:0 16px; z-index:20; transition:.3s;
}
.search:hover{box-shadow:0 15px 25px rgba(0,0,0,.15);}
.search input{
  flex:1; border:none; outline:none; font-size:17px; font-weight:500; color:var(--deep); background:transparent;
}
.fab{
  position:absolute; width:50px; height:50px; background:rgba(255,255,255,.9);
  border-radius:50%; display:flex; justify-content:center; align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,.2); cursor:pointer; transition:.2s; z-index:15;
}
.fab:active{transform:scale(0.95);}
.fab-profile{top:130px;right:20px;}
.fab-location{bottom:340px;right:20px;background:var(--blue); color:white;}
.bottom{
  position:absolute; bottom:0; left:0; right:0; height:380px;
  background:var(--white); border-top-left-radius:30px; border-top-right-radius:30px;
  box-shadow:0 -5px 30px rgba(0,0,0,.15); z-index:30;
  display:flex; flex-direction:column; padding-bottom:30px; transition:transform .4s ease;
}
.handle{width:40px; height:5px; background:#d1d1d6; border-radius:10px; align-self:center; margin:12px 0 20px 0;}
.ride-options{display:flex; flex-direction:column; gap:12px; padding:0 24px;}
.card{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-radius:16px; border:1px solid #f0f0f0; cursor:pointer;
  transition:.3s; position:relative;
}
.card:hover{background:#f0f8ff; border-color:var(--blue);}
.card.selected{background:#F0F7FF;border-color:var(--blue);}
.left{display:flex; align-items:center; gap:16px;}
.car{width:50px; height:50px; border-radius:14px; display:flex; justify-content:center; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.1);}
.details h3{margin:0;font-size:17px;font-weight:600;color:var(--deep);}
.details p{margin:4px 0 0 0;font-size:13px;color:var(--gray);}
.right{text-align:right;}
.price{font-size:18px;font-weight:700;color:var(--deep);}
.eta{font-size:13px;color:var(--gray);margin-top:2px;display:block;}
</style>
</head>
<body>
<div class="phone">
  <div class="map"></div>
  <div class="pin"></div>
  <div class="fab fab-profile">👤</div>
  <div class="fab fab-location">📍</div>
  <div class="search">
    <input type="text" placeholder="Where to?">
  </div>
  <div class="bottom">
    <div class="handle"></div>
    <div class="ride-options">
      <div class="card selected">
        <div class="left"><div class="car">🚗</div><div class="details"><h3>Economy</h3><p>3 min</p></div></div>
        <div class="right"><span class="price">384–480 جـ</span></div>
      </div>
      <div class="card">
        <div class="left"><div class="car">🚙</div><div class="details"><h3>Luxury</h3><p>5 min</p></div></div>
        <div class="right"><span class="price">800–960 جـ</span></div>
      </div>
      <div class="card">
        <div class="left"><div class="car">🚐</div><div class="details"><h3>Van</h3><p>8 min</p></div></div>
        <div class="right"><span class="price">1280–1440 جـ</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
